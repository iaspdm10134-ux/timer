<style>
button {
    font-size: 22px;
    margin: 12px;
    padding: 16px 25px; /* 调整左右内边距 */
    border-radius: 10px;
    border: none;
    cursor: pointer;
    min-width: 140px;      /* 增加最小宽度 */
    max-width: 90%;         /* 最大占屏幕宽度 90% */
    white-space: nowrap;    /* 不换行，文字缩小或撑开按钮 */
    overflow: hidden;       /* 超出隐藏 */
    text-overflow: ellipsis; /* 溢出显示省略号（可选） */
}
#startBtn { background-color: #4CAF50; color: white; }
#pauseBtn { background-color: #f44336; color: white; }
</style>
